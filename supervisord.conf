[supervisord]
nodaemon=true
loglevel=info
logfile=/dev/null

[program:backend]
command=make run-prod-backend
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr

[program:frontend]
command=make run-prod-frontend
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr

[program:taskiq]
command=make run-prod-taskiq
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr

[program:caddy]
command=make run-prod-caddy
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
